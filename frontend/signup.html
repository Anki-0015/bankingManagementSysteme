<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account • NovaBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <div class="toast-container" id="toastContainer"></div>
  <div class="bg-blur">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
  </div>
  <div class="center-wrap">
    <div class="card auth-card">
      <h1 class="page-title">Create your account</h1>
      <form id="signupForm" novalidate>
        <label class="field">
          <span>Username</span>
          <div class="input-wrap">
            <input type="text" id="signupUsername" placeholder="Choose a username" autocomplete="username" required />
          </div>
        </label>
        <label class="field">
          <span>Email</span>
          <div class="input-wrap">
            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </label>
        <label class="field">
          <span>Password</span>
          <div class="input-wrap" style="display:flex; gap:.5rem; align-items:center;">
            <input type="password" id="signupPassword" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required />
            <button type="button" id="toggleSignupPw" class="btn ghost" style="font-size:.65rem; padding:.4rem .6rem;">Show</button>
          </div>
          <div class="field-hint">Use 8+ chars with letters & numbers</div>
        </label>
        <button type="submit">Create Account</button>
        <div class="flex gap-sm mt-md" style="justify-content:space-between; align-items:center; flex-wrap:wrap;">
          <div style="display:flex; gap:.45rem; flex-wrap:wrap;">
            <a href="login.html" class="btn outline" style="font-size:.65rem; padding:.45rem .6rem;">Back to login</a>
            <a href="forgot.html" class="btn outline" style="font-size:.65rem; padding:.45rem .6rem;">Get OTP</a>
            <a href="reset.html" class="btn outline" style="font-size:.65rem; padding:.45rem .6rem;">Reset w/ OTP</a>
          </div>
          <label class="theme-toggle" style="font-size:.65rem;">
            <input type="checkbox" id="themeToggle" />
            <span class="toggle-indicator"></span>
          </label>
        </div>
      </form>
      <div class="auth-alt">Already have an account? <a href="login.html">Sign in</a></div>
    </div>
    <footer>© <span id="year"></span> NovaBank • Secure Banking Interface</footer>
  </div>
  <script src="ui.js"></script>
  <script src="auth.js"></script>
  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
</body>
</html>
