# Default admin bootstrap (DO NOT use weak password in production)
app.admin.enabled=true
app.admin.username=admin
app.admin.email=admin@bank.local
app.admin.password=admin1234
# If true and an ADMIN already exists with the same username, its password will be updated to match app.admin.password
# Custom flag (non-standard) consumed by AdminBootstrap to synchronize existing admin password
app.admin.sync-password-on-start=true

