### Primary MySQL datasource
# Added allowPublicKeyRetrieval + createDatabaseIfNotExist to address 'Public Key Retrieval is not allowed' & first-run DB creation
spring.datasource.url=jdbc:mysql://localhost:3306/banking_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Ankit_1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Explicit dialect to avoid metadata lookup failure if connection is delayed momentarily
# Hibernate dialect explicit entries removed (MySQL dialect auto-detected; previous entries were deprecated warnings)
# spring.jpa.database-platform and hibernate.dialect no longer needed.

# Make datasource resilient: don't fail fast if MySQL is momentarily down (Hikari will keep trying in background)
spring.datasource.hikari.initializationFailTimeout=0
# Optional: extend connection timeout (default 30s) if your MySQL sometimes takes longer to come up
# spring.datasource.hikari.connectionTimeout=45000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

